name: Jobs Function CI/CD

on:
  push:
    branches: [ main, dev, feature_ci-cd_setup ]
  pull_request:
    branches: [ dev ]

jobs:
  deploy:
    name: Deploy Jobs Function to Azure
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'supa-neighbour-jobs' 
          package: functions/jobs
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_JOBS_PUBLISH_PROFILE }}
